# Mi Día — Netlify config
# Single self-contained HTML app, no build step.
# Serves the promoted build (mi-dia.html) at the site root.

[build]
  publish = "."
  command = ""

# Serve mi-dia.html at "/" without changing the URL (200 = rewrite, not redirect).
# mi-dia.html is the promoted latest build, so the live site always tracks it.
[[redirects]]
  from = "/"
  to = "/mi-dia.html"
  status = 200

# Hide the old versioned builds: any direct request to /mi-dia-vNN.html sends the
# visitor to the homepage (latest version). The files stay in git as rollback
# points; they are just not reachable on the public site.
[[redirects]]
  from = "/mi-dia-v*"
  to = "/"
  status = 301
  force = true
