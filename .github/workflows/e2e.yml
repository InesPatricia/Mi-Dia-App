name: e2e

# Runs the Playwright suite on every push to main and on PRs.
# Demonstrates SHARDING: the suite is split across N parallel CI jobs (different machines),
# each running its slice with --shard=i/n. Each job also uses WORKERS to parallelise across
# that machine's cores (config pins 2 in CI). A final job merges the per-shard blob reports
# into one HTML report. This is separate from the Cloudflare Pages deploy (which is unaffected).

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: e2e

jobs:
  test:
    name: test (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2] # SHARD_TOTAL = 2 (keep the /2 below in sync with this list)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run shard ${{ matrix.shard }} of 2
        run: npx playwright test --shard=${{ matrix.shard }}/2
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: e2e/blob-report
          retention-days: 7

  merge-report:
    name: merge reports
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into one HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: e2e/playwright-report
          retention-days: 14
